name: bench
run-name: bench
on:
  push:
    branches: [main]
  pull_request:
jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      FIRESTORE_EMULATOR_VERSION: 1.19.8
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Firestore emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firestore-emulator-v${{ env.FIRESTORE_EMULATOR_VERSION }}
      - name: Download Firestore emulator
        run: |
          JAR=~/.cache/firebase/emulators/cloud-firestore-emulator-v${FIRESTORE_EMULATOR_VERSION}.jar
          if [ ! -f "$JAR" ]; then
            mkdir -p ~/.cache/firebase/emulators
            curl -o "$JAR" https://storage.googleapis.com/firebase-preview-drop/emulator/cloud-firestore-emulator-v${FIRESTORE_EMULATOR_VERSION}.jar
          fi
      - name: Start Firestore emulator
        run: |
          java -jar ~/.cache/firebase/emulators/cloud-firestore-emulator-v${FIRESTORE_EMULATOR_VERSION}.jar \
            --host=0.0.0.0 --port=60001 &
      - name: Wait for emulator
        run: |
          timeout 15 bash -c 'until nc -z localhost 60001; do sleep 0.5; done'
          sleep 3
      - name: Download baseline
        if: github.event_name == 'pull_request'
        id: download-baseline
        uses: dawidd6/action-download-artifact@v9
        with:
          name: bench-results
          workflow: bench.yaml
          branch: main
          if_no_artifact_found: warn
          path: baseline
        continue-on-error: true
      - name: Run bench
        run: |
          if [ -f baseline/bench-results.json ]; then
            pnpm bench --compare baseline/bench-results.json 2>&1 | tee output/bench-raw.txt
          else
            pnpm bench 2>&1 | tee output/bench-raw.txt
          fi
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('output/bench-raw.txt', 'utf8');
            const output = raw.replace(/\x1B\[[0-9;]*[mGKHFJ]/g, '');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Benchmark Results\n\n```\n' + output + '\n```',
            });
      - name: Upload bench results
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: output/bench-results.json
          retention-days: 90
