name: ci
run-name: ci
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - run: pnpm build
      - run: pnpm check
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-firestore-emulator
      - run: pnpm test
  bench:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-firestore-emulator
      - name: Download baseline
        if: github.event_name == 'pull_request'
        id: download-baseline
        uses: dawidd6/action-download-artifact@v9
        with:
          name: bench-results
          workflow: ci.yaml
          branch: main
          if_no_artifact_found: warn
          path: baseline
        continue-on-error: true
      - name: Run bench
        run: |
          if [ -f baseline/bench-results.json ]; then
            pnpm bench --compare baseline/bench-results.json 2>&1 | tee output/bench-raw.txt
          else
            pnpm bench 2>&1 | tee output/bench-raw.txt
          fi
      - name: Post PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.draft != true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('output/bench-raw.txt', 'utf8');
            const output = raw.replace(/\x1B\[[0-9;]*[mGKHFJ]/g, '');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Benchmark Results\n\n```\n' + output + '\n```',
            });
      - name: Upload bench results
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: output/bench-results.json
          retention-days: 90
